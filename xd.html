<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psych Engine Converter</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.box{
    background:#1d1d1d;
    padding:20px;
    border-radius:20px;
    max-width:700px;
    margin:auto;
}

button{
    background:#4CAF50;
    border:none;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    margin-top:15px;
    font-size:16px;
}

.info{
    margin-top:20px;
    background:#222;
    padding:15px;
    border-radius:10px;
}

a{
    display:block;
    margin-top:20px;
    color:lime;
    font-size:20px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="box">

<h1>🔥 Psych Engine Chart Converter</h1>

<p>
1.0.3 ➜ 0.7.3
</p>

<input type="file" id="jsonInput" accept=".json"><br>

<button onclick="convertChart()">
⚡ Convertir Chart
</button>

<div class="info" id="info">
Esperando chart...
</div>

<div id="downloadArea"></div>

</div>

<script>

let convertedBlob = null;

async function convertChart(){

    const file =
        document
        .getElementById('jsonInput')
        .files[0];

    if(!file){

        alert("Selecciona un JSON");
        return;
    }

    const info =
        document.getElementById('info');

    info.innerHTML =
        "⏳ Convirtiendo...";

    const text =
        await file.text();

    let json =
        JSON.parse(text);

    // =========================
    // CONVERTIR A 0.7.3
    // =========================

    delete json.events;
    delete json.eventObjects;
    delete json.gfVersion;
    delete json.arrowSkin;
    delete json.splashSkin;
    delete json.disableNoteRGB;
    delete json.gameOverChar;
    delete json.gameOverSound;
    delete json.gameOverLoop;
    delete json.gameOverEnd;

    if(json.notes){

        for(let sec of json.notes){

            delete sec.sectionBeats;
            delete sec.gfSection;
            delete sec.bpm;

        }
    }

    const convertedJSON =
        JSON.stringify(json, null, 4);

    convertedBlob =
        new Blob(
            [convertedJSON],
            {type:'application/json'}
        );

    info.innerHTML =
        "✅ Chart convertido";

    createDownloadLink();
}

function createDownloadLink(){

    const area =
        document.getElementById('downloadArea');

    area.innerHTML = "";

    const url =
        URL.createObjectURL(convertedBlob);

    const a =
        document.createElement('a');

    a.href = url;

    a.innerHTML =
        "📥 TOCA AQUÍ PARA DESCARGAR EL CHART";

    // IMPORTANTE PARA iPhone
    a.target = "_blank";

    area.appendChild(a);
}

</script>

</body>
</html>
