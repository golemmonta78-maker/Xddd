<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psych Engine 1.0.3 ➜ 0.7.3</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.box{
    background:#1d1d1d;
    padding:20px;
    border-radius:20px;
    max-width:700px;
    margin:auto;
}

button{
    background:#4CAF50;
    border:none;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    margin-top:15px;
    font-size:16px;
    cursor:pointer;
}

.info{
    margin-top:20px;
    background:#222;
    padding:15px;
    border-radius:10px;
}

a{
    display:block;
    margin-top:20px;
    color:lime;
    font-size:22px;
    text-decoration:none;
}

textarea{
    width:100%;
    height:250px;
    margin-top:20px;
    background:#181818;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px;
}

</style>
</head>

<body>

<div class="box">

<h1>🔥 Psych Engine Converter</h1>

<p>
Convierte charts de Psych Engine 1.0.3 ➜ 0.7.3 😎
</p>

<input type="file" id="jsonInput" accept=".json"><br>

<button onclick="convertChart()">
⚡ Convertir Chart
</button>

<div class="info" id="info">
Esperando chart...
</div>

<textarea id="preview"></textarea>

<div id="downloadArea"></div>

</div>

<script>

async function convertChart(){

    const file =
        document
        .getElementById('jsonInput')
        .files[0];

    if(!file){

        alert("Selecciona un chart JSON");
        return;
    }

    const info =
        document.getElementById('info');

    info.innerHTML =
        "⏳ Convirtiendo...";

    const text =
        await file.text();

    let json =
        JSON.parse(text);

    // =========================
    // ASEGURARSE QUE EXISTA song
    // =========================

    if(json.song){

        // BORRAR CAMPOS DE 1.0.3
        delete json.song.gfVersion;
        delete json.song.gameOverChar;
        delete json.song.gameOverSound;
        delete json.song.gameOverLoop;
        delete json.song.gameOverEnd;
        delete json.song.arrowSkin;
        delete json.song.splashSkin;
        delete json.song.disableNoteRGB;
        delete json.song.events;
        delete json.song.eventObjects;

        // LIMPIAR SECCIONES
        if(json.song.notes){

            for(let sec of json.song.notes){

                delete sec.sectionBeats;
                delete sec.gfSection;
                delete sec.bpm;

            }
        }
    }

    // =========================
    // JSON FINAL
    // =========================

    const convertedJSON =
        JSON.stringify(json, null, 4);

    document
    .getElementById('preview')
    .value =
        convertedJSON;

    info.innerHTML =
        "✅ Chart convertido correctamente";

    // =========================
    // DESCARGA
    // =========================

    const blob =
        new Blob(
            [convertedJSON],
            {type:'application/json'}
        );

    const url =
        URL.createObjectURL(blob);

    const area =
        document.getElementById('downloadArea');

    area.innerHTML = "";

    const link =
        document.createElement('a');

    link.href =
        url;

    link.download =
        "converted-chart.json";

    link.innerHTML =
        "📥 DESCARGAR CHART";

    link.target =
        "_blank";

    area.appendChild(link);
}

</script>

</body>
</html>
