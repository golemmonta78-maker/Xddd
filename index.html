<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNF Sprite Sheet Optimizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(0, 0, 0, 0.3); border-radius: 15px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); }
        .upload-section { background: rgba(0, 0, 0, 0.3); padding: 25px; border-radius: 15px; margin-bottom: 20px; }
        .upload-area { border: 3px dashed rgba(255, 255, 255, 0.5); border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 20px; }
        .upload-area:hover { border-color: rgba(255, 255, 255, 0.8); background: rgba(255, 255, 255, 0.1); }
        .file-input { display: none; }
        .btn { background: #4a00e0; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: all 0.3s; margin: 5px; }
        .btn:hover { background: #5a10f0; transform: translateY(-2px); }
        .btn-optimize { background: #00b09b; }
        .btn-download { background: #ff416c; }
        .btn-xml { background: #ff9800; }
        .preview-container { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .preview-box { flex: 1; min-width: 200px; text-align: center; }
        .preview-img { max-width: 100%; max-height: 150px; border-radius: 8px; background: #222; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; flex-wrap: wrap; gap: 15px; }
        .stat { text-align: center; padding: 15px; background: rgba(255, 255, 255, 0.1); border-radius: 8px; min-width: 120px; }
        .status { padding: 15px; border-radius: 8px; margin: 15px 0; text-align: center; }
        .status.success { background: rgba(0, 180, 155, 0.2); }
        .file-info { margin: 15px 0; padding: 15px; background: rgba(255, 255, 255, 0.1); border-radius: 8px; }
        .btn-container { display: flex; flex-wrap: wrap; justify-content: center; }
        .name-input { 
            background: rgba(255, 255, 255, 0.1); 
            border: 2px solid rgba(255, 255, 255, 0.3); 
            border-radius: 8px; 
            padding: 12px; 
            color: white; 
            font-size: 1rem; 
            width: 100%; 
            max-width: 300px; 
            margin: 10px 0;
        }
        .name-input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .name-container { text-align: center; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>FNF Sprite Sheet Optimizer</h1>
            <p>Optimiza spritesheets y XML al 50% para Friday Night Funkin'</p>
        </header>
        
        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <h3>Arrastra tu imagen aquí</h3>
                <p>PNG/JPG</p>
                <input type="file" id="imageInput" class="file-input" accept="image/*">
            </div>
            
            <div class="btn-container">
                <button class="btn btn-xml" id="xmlBtn">Importar XML</button>
                <input type="file" id="xmlInput" class="file-input" accept=".xml">
            </div>
            
            <div class="file-info" id="fileInfo">
                <p>No se han cargado archivos</p>
            </div>
            
            <div class="btn-container">
                <button class="btn btn-optimize" id="optimizeBtn" disabled>Optimizar al 50%</button>
                <button class="btn btn-download" id="downloadBtn" disabled>Descargar Todo</button>
            </div>
            
            <div class="name-container">
                <input type="text" id="spriteName" class="name-input" placeholder="Nombre del spritesheet (opcional)">
                <p style="font-size: 0.9rem; margin-top: 5px;">Si no ingresas un nombre, se usará "fnf_sprite_optimized"</p>
            </div>
            
            <div class="status" id="statusMessage"></div>
        </div>
        
        <div class="preview-container">
            <div class="preview-box">
                <h3>Original</h3>
                <img id="originalPreview" class="preview-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMzMzIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iI2ZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPlNwZWx1bmEgb3JpZ2luYWw8L3RleHQ+PC9zdmc+" alt="Original">
            </div>
            
            <div class="preview-box">
                <h3>Optimizado</h3>
                <img id="optimizedPreview" class="preview-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMzMzIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iI2ZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPlNwZWx1bmEgb3B0aW1pemFkYTwvdGV4dD48L3N2Zz4=" alt="Optimizado">
            </div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div>Tamaño Original</div>
                <div id="originalSize">0 KB</div>
            </div>
            
            <div class="stat">
                <div>Tamaño Optimizado</div>
                <div id="optimizedSize">0 KB</div>
            </div>
            
            <div class="stat">
                <div>Reducción</div>
                <div id="reduction">0%</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Elementos DOM
            const el = {
                imageInput: document.getElementById('imageInput'),
                xmlInput: document.getElementById('xmlInput'),
                uploadArea: document.getElementById('uploadArea'),
                xmlBtn: document.getElementById('xmlBtn'),
                optimizeBtn: document.getElementById('optimizeBtn'),
                downloadBtn: document.getElementById('downloadBtn'),
                originalPreview: document.getElementById('originalPreview'),
                optimizedPreview: document.getElementById('optimizedPreview'),
                fileInfo: document.getElementById('fileInfo'),
                statusMessage: document.getElementById('statusMessage'),
                originalSize: document.getElementById('originalSize'),
                optimizedSize: document.getElementById('optimizedSize'),
                reduction: document.getElementById('reduction'),
                spriteName: document.getElementById('spriteName')
            };
            
            // Datos de la aplicación
            const data = {
                originalImage: null,
                optimizedImage: null,
                originalXML: null,
                optimizedXML: null,
                originalImageSize: 0,
                xmlFileName: null
            };

            // Event listeners
            el.uploadArea.addEventListener('click', () => el.imageInput.click());
            el.xmlBtn.addEventListener('click', () => el.xmlInput.click());
            
            el.uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                el.uploadArea.style.borderColor = 'rgba(255, 255, 255, 0.8)';
            });
            
            el.uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                el.uploadArea.style.borderColor = 'rgba(255, 255, 255, 0.5)';
                handleImageFile(e.dataTransfer.files[0]);
            });
            
            el.imageInput.addEventListener('change', (e) => handleImageFile(e.target.files[0]));
            el.xmlInput.addEventListener('change', (e) => handleXMLFile(e.target.files[0]));
            
            el.optimizeBtn.addEventListener('click', optimizeAll);
            el.downloadBtn.addEventListener('click', downloadAll);

            function handleImageFile(file) {
                if (!file || !file.type.startsWith('image/')) {
                    showStatus('Por favor, selecciona una imagen válida', 'error');
                    return;
                }
                
                // Establecer nombre por defecto basado en el nombre del archivo
                const baseName = file.name.replace(/\.[^/.]+$/, ""); // Remover extensión
                el.spriteName.value = baseName + '_optimized';
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    data.originalImage = new Image();
                    data.originalImage.onload = function() {
                        updateFileInfo(file.name, data.xmlFileName);
                        el.originalPreview.src = e.target.result;
                        el.optimizeBtn.disabled = false;
                        data.originalImageSize = file.size;
                        el.originalSize.textContent = formatFileSize(file.size);
                        showStatus('Imagen cargada. Listo para optimizar.', 'success');
                    };
                    data.originalImage.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            function handleXMLFile(file) {
                if (!file || !file.name.endsWith('.xml')) {
                    showStatus('Por favor, selecciona un archivo XML válido', 'error');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    data.originalXML = e.target.result;
                    data.xmlFileName = file.name;
                    updateFileInfo(data.originalImage ? 'Imagen cargada' : null, file.name);
                    showStatus('XML cargado correctamente', 'success');
                };
                reader.readAsText(file);
            }

            function updateFileInfo(imageName, xmlName) {
                let infoHTML = '';
                if (imageName) infoHTML += `<p><strong>Imagen:</strong> ${imageName}${data.originalImage ? ` (${data.originalImage.width}×${data.originalImage.height})` : ''}</p>`;
                if (xmlName) infoHTML += `<p><strong>XML:</strong> ${xmlName}</p>`;
                if (!infoHTML) infoHTML = '<p>No se han cargado archivos</p>';
                el.fileInfo.innerHTML = infoHTML;
            }

            function optimizeAll() {
                if (!data.originalImage) return;
                
                showStatus('Optimizando...', 'success');
                
                // Optimizar imagen
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = Math.floor(data.originalImage.width * 0.5);
                canvas.height = Math.floor(data.originalImage.height * 0.5);
                ctx.drawImage(data.originalImage, 0, 0, canvas.width, canvas.height);
                data.optimizedImage = canvas.toDataURL('image/png', 0.9);
                el.optimizedPreview.src = data.optimizedImage;
                
                // Optimizar XML si existe
                if (data.originalXML) {
                    data.optimizedXML = optimizeXML(data.originalXML);
                }
                
                // Calcular estadísticas
                const optimizedSizeBytes = Math.floor((data.optimizedImage.length * 3) / 4);
                el.optimizedSize.textContent = formatFileSize(optimizedSizeBytes);
                const reductionPercent = Math.floor((1 - optimizedSizeBytes / data.originalImageSize) * 100);
                el.reduction.textContent = `${reductionPercent}%`;
                
                el.downloadBtn.disabled = false;
                showStatus(`¡Optimizado! Reducción del ${reductionPercent}%`, 'success');
            }

            function optimizeXML(xmlContent) {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlContent, 'text/xml');
                const subTextures = xmlDoc.getElementsByTagName('SubTexture');
                
                for (let subTexture of subTextures) {
                    const attrs = ['x', 'y', 'width', 'height', 'frameX', 'frameY', 'frameWidth', 'frameHeight'];
                    
                    for (let attr of attrs) {
                        if (subTexture.hasAttribute(attr)) {
                            const value = parseInt(subTexture.getAttribute(attr));
                            subTexture.setAttribute(attr, Math.floor(value * 0.5).toString());
                        }
                    }
                }
                
                return new XMLSerializer().serializeToString(xmlDoc);
            }

            function downloadAll() {
                if (!data.optimizedImage) return;
                
                // Obtener nombre del spritesheet
                let spriteName = el.spriteName.value.trim();
                if (!spriteName) {
                    spriteName = 'fnf_sprite_optimized';
                }
                
                // Limpiar nombre (remover caracteres inválidos)
                spriteName = spriteName.replace(/[^a-z0-9_]/gi, '_');
                
                const zip = new JSZip();
                
                // Añadir imagen optimizada al ZIP
                const imageData = data.optimizedImage.split(',')[1];
                zip.file(`${spriteName}.png`, imageData, {base64: true});
                
                // Añadir XML optimizado al ZIP si existe
                if (data.optimizedXML) {
                    zip.file(`${spriteName}.xml`, data.optimizedXML);
                }
                
                // Generar y descargar ZIP
                zip.generateAsync({type:"blob"}).then(function(content) {
                    const link = document.createElement('a');
                    link.download = `${spriteName}.zip`;
                    link.href = URL.createObjectURL(content);
                    link.click();
                });
                
                showStatus(`Archivos descargados como ${spriteName}.zip`, 'success');
            }

            function showStatus(message, type) {
                el.statusMessage.textContent = message;
                el.statusMessage.className = `status ${type}`;
            }

            function formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
        });
    </script>
</body>
</html>
