<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Psych Converter</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

.box{
    background:#1d1d1d;
    padding:20px;
    border-radius:20px;
    max-width:700px;
    margin:auto;
}

button{
    background:#4CAF50;
    border:none;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    margin-top:15px;
    font-size:16px;
}

.info{
    margin-top:20px;
    background:#222;
    padding:15px;
    border-radius:10px;
}

a{
    display:block;
    margin-top:20px;
    color:lime;
    font-size:22px;
    text-decoration:none;
}

textarea{
    width:100%;
    height:250px;
    margin-top:20px;
    background:#181818;
    color:white;
    border:none;
    border-radius:10px;
    padding:10px;
}

</style>
</head>

<body>

<div class="box">

<h1>🔥 Psych Engine Converter</h1>

<p>
1.0.3 ➜ 0.7.3
</p>

<input type="file" id="jsonInput" accept=".json"><br>

<button onclick="convertChart()">
⚡ Convertir
</button>

<div class="info" id="info">
Esperando chart...
</div>

<textarea id="preview"></textarea>

<div id="downloadArea"></div>

</div>

<script>

// 🔥 BORRAR CAMPOS EN TODO EL JSON
function removeFields(obj){

    const badFields = [

        "gfVersion",
        "gameOverChar",
        "gameOverSound",
        "gameOverLoop",
        "gameOverEnd",
        "arrowSkin",
        "splashSkin",
        "disableNoteRGB",
        "events",
        "eventObjects"

    ];

    if(typeof obj !== "object" || obj === null)
        return;

    for(let key in obj){

        if(badFields.includes(key)){

            delete obj[key];
            continue;
        }

        removeFields(obj[key]);
    }
}

async function convertChart(){

    const file =
        document
        .getElementById('jsonInput')
        .files[0];

    if(!file){

        alert("Selecciona un JSON");
        return;
    }

    const info =
        document.getElementById('info');

    info.innerHTML =
        "⏳ Convirtiendo...";

    const text =
        await file.text();

    let json =
        JSON.parse(text);

    // 🔥 BORRAR TODO LO INCOMPATIBLE
    removeFields(json);

    // 🔥 LIMPIAR SECCIONES
    if(json.song && json.song.notes){

        for(let sec of json.song.notes){

            delete sec.sectionBeats;
            delete sec.gfSection;
            delete sec.bpm;

        }
    }

    const convertedJSON =
        JSON.stringify(json, null, 4);

    document
    .getElementById('preview')
    .value =
        convertedJSON;

    info.innerHTML =
        "✅ Chart convertido";

    // 🔥 DESCARGA
    const blob =
        new Blob(
            [convertedJSON],
            {type:'application/json'}
        );

    const url =
        URL.createObjectURL(blob);

    const area =
        document
        .getElementById('downloadArea');

    area.innerHTML = "";

    const link =
        document.createElement('a');

    link.href =
        url;

    link.download =
        "converted-chart.json";

    link.innerHTML =
        "📥 DESCARGAR CHART";

    link.target =
        "_blank";

    area.appendChild(link);
}

</script>

</body>
</html>
